name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Syntax check
        run: python -m py_compile main.py modules/*.py

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: CLI help
        env:
          CASHCRAB_HOME: ${{ github.workspace }}/.cashcrab-test
        run: |
          cashcrab --help
          cashcrab auth qwen --help
          cashcrab tw --help
          cashcrab dashboard --help
          cashcrab skills --help
          cashcrab agents --help

      - name: Menu smoke test
        env:
          CASHCRAB_HOME: ${{ github.workspace }}/.cashcrab-test
        run: printf '0\n' | cashcrab
